name: Deploy backend

on:
  push:
    branches: [BACK-main]
    paths:
      - "Backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci
        working-directory: Backend

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: Backend/
          server-dir: /subsites/api.shiftfestival.be/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Restart backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/subsites/api.shiftfestival.be/logs
            cd ~/subsites/api.shiftfestival.be
            kill $(pgrep -f "node src/server.js") 2>/dev/null || true
            setsid node src/server.js > ~/subsites/api.shiftfestival.be/logs/app.log 2>&1 &
            sleep 2
            pgrep -f "node src/server.js" && echo "Node running" || echo "Node NOT running"
