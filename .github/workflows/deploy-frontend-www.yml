name: Deploy live website

on:
    push:
        branches: [FRONT-main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: npm ci
              working-directory: Frontend
            - run: npm run build
              working-directory: Frontend
            - uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  source: Frontend/dist/
                  target: ~/www/
                  strip_components: 2
                  rm: true
