<!doctype html>
<html lang="en">
	<head>
		<link rel="preload" as="image" href="../assets/logos/ehb_wit.png" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/x-icon" href="../../favicon/shift_icon.svg" />
		<link rel="stylesheet" href="../../src/css/style.css" />
		<link rel="stylesheet" href="index.css" />
		<script type="module" src="../../src/js/language.js"></script>
		<script type="module" src="index.js"></script>
		<title>Shift - project form 3de jaars</title>
	</head>
	<body>
		<load file="../../htmlComponents/header.fragment.html" />
		<div class="wrap">
			<div class="section">
				<h1>Project formulier</h1>
				<h3>
					Vul het korte formulier in om je project op de Shift festival website
					te plaatsen.
				</h3>
				<form class="form-3de" action="#">
			<div class="form-wrap">
        <div class="firstHalf">
          <div class="textWrap">
			<input
				type="text"
				name="nameProject"
				id="nameProject"
				required
				placeholder="Titel van het project..."
				/>
			</div>
          <div class="textWrap">
			<select required class="courseSelect">
              <option disabled selected>Specialisatie</option>
              <option value="Website">Website</option>
              <option>Installatie</option>
              <option>Mobile App</option>
              <option>VR & AR</option>
              <option>3D Games</option>
              <option>Motion</option>
            </select>
			</div>
          <h3>Wie heeft hieraan gewerkt?</h3>
		<div class="textWrap">
			<input
				type="text"
				name="nameStudent"
				id="nameStudent"
				required
				placeholder="Jouw volledige naam..."
				/>
            </div>
		<div class="emailDiv">
				<input
				type="email"
				name="email"
				id="email"
				placeholder="E-mail..."
				autocomplete="email"
				required
				/>
			</div>
        <div class="textWrap">
			<input
				type="text"
				name="linkedinURL"
				id="linkedinURL"
				required
				placeholder="URL naar LinkedIn profiel..."
				/>
			</div>
			<div class="imageSelector">
				<label for="choose-file">Selfie</label>
				<input type="file" accept="image/*" id="choose-selfieFile" name="choose-selfieFile"/>
				<div id="file-list"></div>
			</div>
			<div class="extraButton">
			<button id="extraPerson" href="#">Extra persoon toevogen</button>
			<div class="extraPersonForm">

			</div>
			</div>
			<div class="textWrap">
				<textarea class="projectInfo" 
				name="description" 
				id="description"
				maxlength="1250"
				rows="5"
				placeholder="Projectbeschrijving..."
				required ></textarea>
			</div>
			<div class="imageSelector">
				<label for="choose-file">Projectbeeld</label>
				<input type="file" accept="image/*" id="choose-projectFile" name="choose-projectFile"/>
				<div id="file-list"></div>
			</div>
			<label for="choose-file">Plaats je video op YouTube en plaats de link hier onder (niet privé)</label>
			<div class="textWrap">
				<input
					type="text"
					name="videoURL"
					id="videoURL"
					required
					placeholder="YouTube link van je project footage..."
					/>
			</div>
          	<div class="textWrap">
			<select required class="courseSelect">
              <option disabled selected>Promoter</option>
              <option value="Dennis Baptist">Dennis Baptist</option>
              <option value="Maaike Beuten">Maaike Beuten</option>
              <option value="Joni De Borger">Joni De Borger</option>
              <option value="Peter Dickx">Peter Dickx</option>
              <option value="Bert Heyman">Bert Heyman</option>
              <option value="Stefan Tilburgs">Stefan Tilburgs</option>
			  <option value="Els Vande Kerckhove">Els Vande Kerckhove</option>
			  <option value="An Vanlierde">An Vanlierde</option> 
			  <option value="Kobe Vermeire">Kobe Vermeire</option>
			  <option value="Ben Verschooris">Ben Verschooris</option>
            </select>
			</div>	
          	<div class="imageSelector">
				<label for="choose-file">Magazine (pdf)</label>
				<input type="file" accept=".pdf/*" id="choose-magazineFile" name="choose-magazineFile"/>
				<div id="file-list"></div>
			</div>		
			<div class="submitDiv">
            	<button class="submit" type="submit">Submit</button>
			</div>
			</form>
			</div>
			<load file="../../htmlComponents/footer.fragment.html" />
		</div>
	</body>
</html>
