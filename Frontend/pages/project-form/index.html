<!doctype html>
<html lang="en">

<head>
	<link rel="preload" as="image" href="../assets/logos/ehb_wit.png" />
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/x-icon" href="../../favicon/shift_icon.svg" />
	<link rel="stylesheet" href="../../src/css/style.css" />
	<link rel="stylesheet" href="index.css" />
	<script type="module" src="../../src/js/language.js"></script>
	<script type="module" src="index.js"></script>
	<title>Shift - project form 3de jaars</title>
</head>

<body>
	<load file="../../htmlComponents/header.fragment.html" />
	<div class="wrap">
		<div class="section">
			<h1>Project formulier</h1>
			<h3>Vul het korte formulier in om je project op de Shift festival website te plaatsen.</h3>
			<form class="form-3de" action="#">
				<div class="part">
					<h3>Project info</h3>
					<div>
						<label for="nameProject">Project title</label>
						<input type="text" name="nameProject" id="nameProject" required placeholder="Titel van het project..." />
					</div>
					<div>
						<label for="description">Description</label>
						<textarea class="projectInfo" name="description" id="description" maxlength="1250" rows="5"
							placeholder="Projectbeschrijving..." required></textarea>
					</div>
					<div>
						<span>Specialisatie</span>
						<select required name="course" id="course" class="courseSelect">
							<option disabled selected>Specialisatie</option>
							<option value="XR & 3D">XR & 3D</option>
							<option value="Experience Design">Experience Design</option>
							<option value="Web & Mobile">Web & Mobile</option>
							<option value="Digital Deisgn">Digital Deisgn</option>
						</select>
					</div>
					<div>
						<span>Promoter</span>
						<select required name="promoter" id="promoter" class="courseSelect">
							<option disabled selected>Promoter</option>
							<option value="Dennis Baptist">Dennis Baptist</option>
							<option value="Maaike Beuten">Maaike Beuten</option>
							<option value="Joni De Borger">Joni De Borger</option>
							<option value="Peter Dickx">Peter Dickx</option>
							<option value="Bert Heyman">Bert Heyman</option>
							<option value="Stefan Tilburgs">Stefan Tilburgs</option>
							<option value="Els Vande Kerckhove">Els Vande Kerckhove</option>
							<option value="An Vanlierde">An Vanlierde</option>
							<option value="Kobe Vermeire">Kobe Vermeire</option>
							<option value="Ben Verschooris">Ben Verschooris</option>
						</select>
					</div>
				</div>
				<div class="part">
					<h3>Personal info</h3>
					<div>
						<label for="firstName">Voornaam</label>
						<input type="text" name="firstName" id="firstName" placeholder="John" />
					</div>
					<div>
						<label for="lastName">Achternaam</label>
						<input type="text" name="lastName" id="lastName" placeholder="Johnson" />
					</div>
					<div>
						<label for="email">Email</label>
						<input type="text" name="email" id="email" placeholder="john.johnson@mail.be" disabled />
					</div>
					<div>
						<label for="linkedinURL">LinkedIn</label>
						<input type="text" name="linkedinURL" id="linkedinURL" required
							placeholder="https://www.linkedin.com/in/john-johnson/" />
					</div>
					<div>
						<label for="choose-file">Portretfoto</label>
						<input type="file" accept="image/*" id="choose-selfieFile" name="choose-selfieFile" />
						<label class="subtext">Gelieve in een 1:1 aspect ratio in te dienen</label>
					</div>
				</div>
				<div class="part">
					<input type="checkbox" hidden id="extraPersonToggle">
					<label for="extraPersonToggle" href="#">
						<h3>Extra persoon toevoegen</h3>
						<span class="addPerson">
							<div class="line"></div>
							<div class="line"></div>
						</span>
					</label>
					<div class="extraPersonForm">
						<div>
							<label for="2ndStudentFirstName">Voornaam</label>
							<input type="text" name="2ndStudentFirstName" id="2ndStudentFirstName" placeholder="Sarah" />
						</div>
						<div>
							<label for="2ndStudentLastName">Achternaam</label>
							<input type="text" name="2ndStudentLastName" id="2ndStudentLastName" placeholder="Sarahdaughter" />
						</div>
						<div>
							<label for="secondemail">Email</label>
							<input type="email" name="secondemail" id="secondemail" placeholder="sarah.sarahdaughter@mail.be"
								autocomplete="email" />
						</div>
						<div>
							<label for="secondlinkedinurl">LinkedIn</label>
							<input type="text" name="secondlinkedinurl" id="secondlinkedinurl"
								placeholder="https://www.linkedin.com/in/sarah-sarahdaughter/" />
						</div>
						<div>
							<label for="choose-file">Portretfoto</label>
							<input type="file" accept="image/*" id="choose-secondselfiefile" name="choose-secondselfiefile" />
							<label class="subtext">Gelieve in een 1:1 aspect ratio in te dienen</label>
						</div>
					</div>
				</div>
				<div class="part">
					<h3>Project media</h3>
					<div>
						<label for="choose-file">Projectbeeld</label>
						<input type="file" accept="image/*" id="choose-projectFile" name="choose-projectFile" />
						<label class="subtext">Gelieve in een 16:9 aspect ratio in te dienen</label>
					</div>
					<div>
						<label for="choose-file">Plaats je video op YouTube en plaats de link hier onder (niet privé)</label>
						<input type="text" name="videoURL" id="videoURL" required
							placeholder="YouTube link van je project footage..." />
					</div>
					<div>
						<label for="choose-file">Magazine (pdf)</label>
						<input type="file" accept=".pdf/*" id="choose-magazineFile" name="choose-magazineFile" />
					</div>
				</div>
				<button class="submit" type="submit">Submit</button>
			</form>
		</div>
		<load file="../../htmlComponents/footer.fragment.html" />
	</div>
</body>

</html>
