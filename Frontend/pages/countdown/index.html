<!doctype html>
<html lang="en">
	<head>
		<link rel="modulepreload" href="../../src/js/countdown.js" />
		<link rel="modulepreload" href="./index.js" />
		<link rel="preload" as="image" href="../../ehb_wit.png" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/x-icon" href="../../shift_icon.svg" />
		<link rel="stylesheet" href="../../src/css/style.css" />
		<link rel="stylesheet" href="./index.css" />
		<script type="module" src="../../src/js/countdown.js"></script>
		<script type="module" src="../../src/js/language.js"></script>
		<script type="module" src="./index.js"></script>
		<title>Shift - countdown</title>
	</head>
	<body>
		<div class="wrap topSpacer">
			<div>
				<img
					src="../../ehb_wit.png"
					fetchpriority="high"
					class="topLeft"
				/>
				<img
					src="../../assets/shift_logo.svg"
					id="heroLogo"
					fetchpriority="high"
				/>
				<div class="heroWrapper">
					<div class="rotatedText">
						<h1>Eindprojecten</h1>
						<div class="heroText">
							<h3>
								OPLEIDING MULTIMEDIA<br />
								CREATIEVE TECHNOLOGIE
							</h3>
							<h2>&</h2>
						</div>
					</div>
				</div>
				<div class="timerDiv xlarge">
					<span id="timer" class="hidden"
						><span id="days">10</span>D <span id="hours">00</span>H
						<span id="minutes">00</span>M
						<span id="seconds">00</span>S
					</span>
					<br />
					<div class="main">
						<h3>VRIJDAG 19 JUNI</h3>
						<h3>17:00 - 21:30</h3>
					</div>
				</div>
				<form id="signup">
					<label for="email"> Stay up to date for the event!</label>
					<div class="emailWrap">
						<input
							class="white-input"
							type="email"
							name="email"
							id="email"
							placeholder="E-mail..."
							autocomplete="email"
							required
						/>
						<button value="submit" id="submit" disabled>
							Schrijf je in!
						</button>
					</div>
					<label for="check" class="txtLeft">
						<input
							type="checkbox"
							name="check"
							id="check"
							class="xsMarginTop"
						/>
						Keep me up to date.
					</label>
					<p class="privacy-policy">
						Jouw data blijft van jou. Check het
						<a href="/pages/privacy/nl/" class="languageLink"
							>Privacybeleid</a
						>.
					</p>
				</form>
				<h3>Wil je er zeker bij zijn?</h3>
				<h3>Plaatst het nu al in je aganda.</h3>
				<button class="bold orange-button" id="std">
					Save the date!
				</button>
			</div>
			<load file="../../htmlComponents/footer.fragment.html" />
		</div>
	</body>
</html>
