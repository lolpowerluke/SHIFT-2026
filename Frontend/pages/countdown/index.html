<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="modulepreload" href="../../src/js/countdown.js" />
		<link rel="modulepreload" href="./index.js" />
		<link rel="preload" as="image" href="../../ehb_wit.png" />
		<link
			rel="preload"
			as="image"
			href="../../assets/TikTok_Logo_Alternative_0.svg"
		/>
		<link
			rel="preload"
			as="image"
			href="../../assets/Instagram_Glyph_White.svg"
		/>
		<link rel="stylesheet" href="../../src/css/style.css" />
		<link rel="stylesheet" href="./index.css" />
		<script type="module" src="../../src/js/countdown.js"></script>
		<script type="module" src="../../src/js/language.js"></script>
		<script type="module" src="./index.js"></script>
		<title>Shift - countdown</title>
	</head>
	<body>
		<div class="wrap">
			<div>
				<img src="../../ehb_wit.png" height="50" fetchpriority="high" />
				<img src="../../assets/shift_logo.svg" id="heroLogo" />
				<div class="heroText rotatedText">
					<h1>Eindprojecten</h1>
					<h3>
						OPLEIDING MULTIMEDIA<br />
						CREATIEVE TECHNOLOGIE
					</h3>
					<h2>&</h2>
				</div>
				<span id="timer" class="hidden"
					><span id="days">10</span>D <span id="hours">00</span>H
					<span id="minutes" class="xlarge">00</span>M
					<span id="seconds">00</span>S
				</span>
				<br />
				<div class="main">
					<h3>VRIJDAG 19 JUNI</h3>
					<h3>17:00 - 21:30</h3>
				</div>
				<button id="std">SAVE THE DATE</button>
				<form id="signup">
					<label for="email"> Stay up to date for the event!</label>
					<div class="emailWrap">
						<input
							type="email"
							name="email"
							id="email"
							placeholder="Laat hier uw email achter..."
						/>
						<button value="submit" id="submit">x</button>
					</div>
					<br />
					<label for="check">
						<input type="checkbox" name="check" id="check" />
						Keep me up to date.
					</label>
				</form>
				<p>
					Jouw data blijft van jou. Check het
					<a href="../privacy/nl/" class="languageLink">Privacybeleid</a>.
				</p>
			</div>
			<footer>
				<div id="socialLinks">
					<a
						href="https://www.instagram.com/multimedia.ehb"
						title="official EhB Instagram"
						><img
							class="social"
							src="../../assets/Instagram_Glyph_White.svg"
							alt="Instagram"
					/></a>
					<a
						href="https://www.tiktok.com/@multimedia.ehb"
						title="official EhB TikTok"
						><img
							class="social"
							src="../../assets/TikTok_Logo_Alternative_0.svg"
							alt="TikTok"
					/></a>
				</div>
				<div class="posBottom">
					<a
						href="https://www.erasmushogeschool.be/nl/opleidingen/multimedia-en-creatieve-technologie"
					>
						<img
							src="../../ehb_wit.png"
							id="EhBLogo"
							height="150"
							fetchpriority="high"
					/></a>
					<p>Nijverheidskaai 170, 1070 Anderlecht</p>
				</div>
			</footer>
		</div>
	</body>
</html>
