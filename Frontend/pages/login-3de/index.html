<!doctype html>
<html lang="en">
	<head>
		<link rel="preload" as="image" href="../assets/logos/ehb_wit.png" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/x-icon" href="../../favicon/shift_icon.svg" />
		<link rel="stylesheet" href="../../src/css/style.css" />
		<link rel="stylesheet" href="index.css" />
		<script type="module" src="../../src/js/language.js"></script>
		<script type="module" src="index.js"></script>
		<title>Shift - project form 3de jaars</title>
	</head>
	<body>
		<load file="../../htmlComponents/header.fragment.html" />
		<div class="wrap">
			<div class="section">
				<h1>Project formulier</h1>
				<h3>
					Vul het korte formulier in om je project op de Shift festival website
					te plaatsen.
				</h3>
				<form class="form-3de" action="#">
					<div class="emailDiv">
						<input
							type="email"
							name="email"
							id="email"
							placeholder="E-mail..."
							autocomplete="email"
							required
						/>
					</div>
					<div class="textWrap">
						<input
							type="password"
							name="password"
							id="password"
							placeholder="Password..."
                            required
						/>
					</div>
					<div class="submitDiv">
                        <button class="submit" type="submit">Login</button>
					</div>
				</form>
			</div>
			<load file="../../htmlComponents/footer.fragment.html" />
		</div>
	</body>
</html>
