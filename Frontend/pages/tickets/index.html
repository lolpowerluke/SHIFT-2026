<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../src/css/style.css">
    <link rel="stylesheet" href="tickets.css">
    <script type="module" src="tickets.js"></script>
    <title>Shift - tickets</title>
</head>
<body>
    <div class="hero">
    <h1>Schrijf je in voor Shift</h1>
    <h3>De toegang tot Shift is volledig gratis. Iedereen is welkom om de projecten te ontdekken en de expo vrij te bezoeken.</h3>
    </div>
    <div class="form">
    <h3>Vul het korte formulier in om je plaats te reserveren.</h3>
    <input type="text" name="firstname" id="firstname" placeholder="Voornaam..."/>
    <input type="text" name="lastname" id="lastname" placeholder="Achternaam..."/>
    <input type="email" name="email"id="email" placeholder="email@example.com"/>
    </div>
    <div class="quantity">
        <button class="minus" aria-label="Decrease">&minus;</button>
        <input type="number" class="input-box" value="1" min="1" max="25">
        <button class="plus" aria-label="Increase">&plus;</button>
    </div>
</body>
</html>
